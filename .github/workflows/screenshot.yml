name: Kantine Screenshot

on:
  workflow_dispatch:
    inputs:
      week_offset:
        description: '0 = current week, 1 = next week'
        required: false
        default: '1'
  schedule:
    # täglich 00:00 UTC = 02:00 CEST → aktuelle Woche (verbleibende Tage)
    - cron: '0 0 * * 1-4'
    # Freitag 12:00 UTC = 14:00 CEST → nächste Woche vorabladen
    - cron: '0 12 * * 5'
    # Samstag 08:00 UTC = 10:00 CEST → nächste Woche
    - cron: '0 8 * * 6'
    # Sonntag 08:00 UTC = 10:00 CEST → nächste Woche
    - cron: '0 8 * * 0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  screenshot:
    runs-on: ubuntu-latest
    env:
      CATERINGPORTAL_URL: "https://siemens.cateringportal.io/menu/Regensburg/Mittagessen"
      CATERINGPORTAL_SID: ${{ secrets.CATERINGPORTAL_SID }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine WEEK_OFFSET
        id: offset
        run: |
          # workflow_dispatch: use input
          # Freitag ab 12:00 UTC (= 14:00 CEST), Samstag, Sonntag: nächste Woche
          # alle anderen Läufe (Mo–Do 00:00 UTC): aktuelle Woche
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "WEEK_OFFSET=${{ github.event.inputs.week_offset }}" >> $GITHUB_ENV
          elif [ "$(date -u +%u)" = "5" ] && [ "$(date -u +%H)" -ge 12 ]; then
            echo "WEEK_OFFSET=1" >> $GITHUB_ENV
          elif [ "$(date -u +%u)" = "6" ] || [ "$(date -u +%u)" = "7" ]; then
            echo "WEEK_OFFSET=1" >> $GITHUB_ENV
          else
            echo "WEEK_OFFSET=0" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq chromium-browser fonts-dejavu fonts-liberation
          pip install playwright Pillow
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Scrape & render menu
        id: screenshot
        run: python scripts/take_screenshot.py

      - name: Generate RSS feed
        if: steps.screenshot.outcome == 'success'
        run: python scripts/generate_rss.py

      - name: Update latest.jpg
        if: steps.screenshot.outcome == 'success'
        run: |
          LATEST=$(ls -t docs/images/kantine_*.jpg 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            cp "$LATEST" docs/images/latest.jpg
            echo "latest.jpg ← $LATEST"
          fi

      - name: Commit and push
        if: steps.screenshot.outcome == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: kantine update $(date -u +%Y-%m-%d) KW-OFFSET=$WEEK_OFFSET"
          git pull --rebase origin main
          git push

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kantine-debug-${{ github.run_number }}
          path: docs/images/
          retention-days: 10
