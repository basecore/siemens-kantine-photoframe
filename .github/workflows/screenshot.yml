name: Weekly Kantine Screenshot

on:
  workflow_dispatch:
  schedule:
    # Jeden Montag 05:30 UTC = 07:30 CEST
    - cron: '30 5 * * 1'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1: Scrape + Render + git push (GitHub-hosted)
  # TODO: upload-haos, upload-fallback und notify wieder aktivieren
  #       sobald das Bild korrekt gerendert wird.
  # ─────────────────────────────────────────────────────────────────
  screenshot:
    runs-on: ubuntu-latest
    env:
      CATERINGPORTAL_URL: "https://siemens.cateringportal.io/menu/Regensburg/Mittagessen"
      CATERINGPORTAL_SID: ${{ secrets.CATERINGPORTAL_SID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq chromium-browser fonts-dejavu curl
          pip install playwright Pillow beautifulsoup4 lxml
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Scrape & render menu
        id: screenshot
        run: python scripts/take_screenshot.py

      - name: Generate RSS feed
        if: steps.screenshot.outcome == 'success'
        run: python scripts/generate_rss.py

      - name: Update latest.jpg
        if: steps.screenshot.outcome == 'success'
        run: |
          LATEST=$(ls -t docs/images/kantine_*.jpg | head -1)
          cp "$LATEST" docs/images/latest.jpg
          echo "latest.jpg updated from: $LATEST"

      - name: Commit and push to GitHub
        if: steps.screenshot.outcome == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: weekly kantine screenshot update $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      # Bild als Artifact herunterladen (10 Tage verfügbar)
      # Actions → Run → Artifacts → "kantine-screenshot-debug"
      - name: Upload image as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kantine-screenshot-debug
          path: docs/images/
          retention-days: 10

  # ─────────────────────────────────────────────────────────────────
  # TODO: Folgende Jobs wieder einkommentieren sobald Rendering läuft:
  #
  # upload-haos:
  #   ...
  # upload-fallback:
  #   ...
  # notify:
  #   ...
  # ─────────────────────────────────────────────────────────────────
